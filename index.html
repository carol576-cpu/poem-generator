<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Poem Generator</title>
  </head>
  <body>
    <div class="container">
      <h1>Welcome to AI Poem Generator</h1>

      <form id="poem-form">
        <input
          type="text"
          id="user-input"
          placeholder="Enter a topic"
          required
        />
        <button type="submit">Generate</button>
      </form>

      <p id="poem" class="poem"></p>
    </div>

    <footer>
      This AI project was coded by Caroline Maf and is
      <a href="https://github.com/carol576-cpu/poem-generator" target="_blank">
        open-sourced on github
      </a>
      and
      <a href="https://stupendous-otter-f4f7f2.netlify.app/" target="_blank"
        >hosted on Netlify</a
      >
    </footer>

    <script src="index.js"></script>
  </body>
</html>
